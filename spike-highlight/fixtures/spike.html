<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>spike</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 0; }
    pre {
      font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: 13px;
      white-space: pre;
      padding: 16px;
      margin: 0;
    }
  </style>
</head>
<body>
<pre id="target"></pre>
<script>
  const params = new URLSearchParams(location.search)
  const size = parseInt(params.get("items") || "40", 10)
  const items = []
  for (let i = 0; i < size; i++) {
    items.push({
      id: i,
      name: "item-" + i,
      tags: ["alpha", "beta", "gamma"],
      active: (i % 2) === 0,
      value: i * 3.14,
    })
  }
  document.getElementById("target").textContent = JSON.stringify({ items })
</script>
</body>
</html>
